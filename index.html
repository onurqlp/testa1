<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AYDA · Sınıf Giriş & Ders Tekrarları</title>
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#234078">
<style>
  :root{
    --ayda:#234078;--bg:#f7f9fc;--ink:#1d2433;--muted:#5b667a;
    --card:#fff;--border:rgba(35,64,120,.12);
    --radius:18px;--shadow:0 12px 30px rgba(0,0,0,.06);
    --ring:rgba(35,64,120,.18)
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Arial}
  html{scroll-behavior:smooth}
  .wrap{min-height:100dvh;display:grid;place-items:center;padding:24px}
  .card{width:100%;max-width:720px;background:var(--card);
    border:1px solid var(--border);box-shadow:var(--shadow);
    border-radius:var(--radius);padding:28px}
  h1{margin:0 0 8px;font-size:clamp(20px,2.6vw,28px)}
  .sub{margin:0 0 18px;color:var(--muted)}
  label{display:block;margin:12px 0 6px;font-weight:600}
  .row{display:flex;gap:10px}
  input[type=text]{flex:1;border:1px solid var(--border);
    border-radius:12px;padding:14px 16px;font-size:16px;outline:none}
  input[type=text]:focus{border-color:var(--ayda);
    box-shadow:0 0 0 6px var(--ring)}
  button{background:var(--ayda);color:#fff;border:0;
    border-radius:12px;padding:14px 18px;font-weight:700;cursor:pointer}
  button:active{transform:translateY(1px)}
  .hint{margin-top:8px;color:var(--muted);font-size:14px}
  .err{margin-top:10px;color:#b00020;font-weight:600}
  header{display:flex;gap:12px;align-items:center;padding:14px 18px;
    background:#fff;border-bottom:1px solid var(--border)}
  a.back{color:#fff;background:var(--ayda);padding:8px 12px;
    border-radius:10px;text-decoration:none;font-weight:700}
  .section{max-width:1100px;margin:24px auto;padding:0 16px}
  iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:12px}
  .btn{display:inline-block;background:var(--ayda);color:#fff;
    text-decoration:none;padding:12px 16px;border-radius:12px;font-weight:700}
  .rowwrap{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .logo-badge{width:36px;height:36px;border-radius:10px;background:var(--ayda)}
  #jumpBtn{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);
    background:var(--ayda);color:#fff;border:0;border-radius:999px;
    padding:12px 16px;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:10px;font-weight:800;z-index:60}
  #jumpBtn[hidden]{display:none}
  .chev{font-size:18px;line-height:1;animation:bob 1.2s infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
</style>
</head>

<body>

<main id="login" class="wrap">
  <section class="card">
    <div class="logo">
      <div class="logo-badge"></div>
      <strong>AYDA Online Eğitim</strong>
    </div>

    <h1>Lütfen sınıf kodunu giriniz</h1>
    <p class="sub">Size verilen sınıf kodunu yazınız</p>

    <label for="code">Sınıf kodu</label>
    <div class="row">
      <input id="code" type="text" autocomplete="off">
      <button id="go">Giriş</button>
    </div>

    <div class="hint">Örnek: A1Aralik25241225</div>
    <div id="err" class="err" hidden>Geçersiz kod.</div>
  </section>
</main>

<section id="class" hidden>
  <header>
    <a class="back" href="#" id="change">← Kodu Değiştir</a>
    <strong id="head">AYDA · Sınıf</strong>
  </header>

  <main class="section">
    <h1 id="titleClass">Ders Tekrarları</h1>
    <p class="sub" id="desc"></p>

    <section class="card">
      <iframe id="yt"
        allow="accelerometer; autoplay; clipboard-write;
               encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen></iframe>

      <div class="rowwrap">
        <a class="btn" id="allBtn" target="_blank">Tüm derslere git (YouTube)</a>
        <a class="btn" href="https://onurqlp.github.io/bibliothek/"
           target="_blank">Online Kütüphane (AYDA)</a>
      </div>

      <p class="hint">
        Video açılmazsa YouTube butonunu kullanabilirsiniz.
      </p>
    </section>
  </main>
</section>

<button id="jumpBtn" hidden><span class="chev">↓</span> Derse git</button>

<script>
  const AYDA_PASSWORD_URL = "https://onurqlp.github.io/ayda-pass/passwords.json";

  const trFold = s => s.toLocaleLowerCase('tr-TR')
    .replace(/ı/g,'i').replace(/ö/g,'o').replace(/ü/g,'u')
    .replace(/ş/g,'s').replace(/ç/g,'c').replace(/ğ/g,'g');

  const classes = {

    },
    'a2kasim25171125': {

      playlistUrl: 'https://www.youtube.com/playlist?list=PLQwhOGFlptnK2FkNjTa1ziOangyy_i50f'

      playlistUrl: 'https://youtube.com/playlist?list=PLQwhOGFlptnLdkvcoYRt9N6Qbret9aikN'
    },
    
    /* ✅ YENİ SINIF */
    '230126': {

      playlistUrl: 'https://www.youtube.com/playlist?list=PLQwhOGFlptnKEr24HrDmHIiakCuXX6ymU'
    },
    /* ✅ YENİ SINIF */
    '030626': {
      name: 'A2 Mart 2026',
      playlistId: 'PLQwhOGFlptnKf8RxzHLd3n1Bm9QJsJRcj',
      playlistUrl: 'https://www.youtube.com/playlist?list=PLQwhOGFlptnKf8RxzHLd3n1Bm9QJsJRcj'
    },
        /* ✅ YENİ SINIF */
    '300126': {
      name: 'A1 Ocak 2026 · Zeynep Hoca',
      playlistId: 'PLQwhOGFlptnIdzy8kvYwGQ05LV1iQxoMO',
      playlistUrl: 'https://www.youtube.com/playlist?list=PLQwhOGFlptnIdzy8kvYwGQ05LV1iQxoMO'
    },

    '290126': {

    },
       /* ✅ YENİ SINIF */
    '010326': {
      name: 'B2 Mart 2026 · Zeynep Hoca',
      playlistId: 'PLQwhOGFlptnLieyVPjWf_jjom7wk8sM7S',
      playlistUrl: 'https://www.youtube.com/playlist?list=PLQwhOGFlptnLieyVPjWf_jjom7wk8sM7S'
    },
    /* ✅ YENİ SINIF */
'240226': {
  name: 'A1 Şubat 2026 · Sibel Hoca',
  playlistId: 'PLQwhOGFlptnJ-vSNRbICk8ucc8Cw00N2O',
  playlistUrl: 'https://www.youtube.com/playlist?list=PLQwhOGFlptnJ-vSNRbICk8ucc8Cw00N2O'
},
    /* ✅ YENİ SINIF */
'160326': {
  name: 'A2 Sınav Hazırlık SABAH 2026 · Süha Hoca',
  playlistId: 'PLQwhOGFlptnKAiy8xdexwUno0ZmfTpzLS',
  playlistUrl: 'https://youtube.com/playlist?list=PLQwhOGFlptnKAiy8xdexwUno0ZmfTpzLS'
},
    /* ✅ YENİ SINIF */
'170326': {

  playlistUrl: 'https://youtube.com/playlist?list=PLQwhOGFlptnLqktYlzyITRj4pjpwRwNng'
},  
    /* ✅ YENİ SINIF */
'200426': {
  name: 'B1 NİSAN 2026 Gizem Hoca ',

}, 
      /* ✅ YENİ SINIF */
'250426': {
  name: 'A2 A2 Nisan (Ocak Devamı) Zeynep Hoca',
  playlistId: 'PLQwhOGFlptnKPF-3In-7mXxi7r2UlHF74',
  playlistUrl: 'https://www.youtube.com/playlist?list=PLQwhOGFlptnKPF-3In-7mXxi7r2UlHF74'
},
    /* ✅ YENİ SINIF */
'080426': {
  name: 'A1 NİSAN 2026 · Furkan Hoca',
  playlistId: 'PLQwhOGFlptnKyFdgy7E1Sh1VNGu_nwOle',
  playlistUrl: 'https://www.youtube.com/playlist?list=PLQwhOGFlptnKyFdgy7E1Sh1VNGu_nwOle'
},

    /* ✅ YENİ SINIF */
    '010226': {
      name: 'A2 Ocak 2026 · Gizem Hoca',
      playlistId: 'PLQwhOGFlptnLOwSCE8IpBt_2ey5_86wu5',
      playlistUrl: 'https://www.youtube.com/playlist?list=PLQwhOGFlptnLOwSCE8IpBt_2ey5_86wu5'
    }
  };

  const $ = id => document.getElementById(id);
  const login = $('login'), klass = $('class');
  const codeInput = $('code'), err = $('err');
  const head = $('head'), yt = $('yt'), allBtn = $('allBtn');
  const desc = $('desc'), jumpBtn = $('jumpBtn');

  function scrollToClass(){
    klass.scrollIntoView({behavior:'smooth'});
  }

  function renderClass(key){
    const c = classes[key];
    if(!c){ err.hidden = false; return; }

    head.textContent = `AYDA · ${c.name}`;
    desc.textContent = `${c.name} için ders tekrarları`;
    yt.src = `https://www.youtube.com/embed/videoseries?list=${c.playlistId}`;
    allBtn.href = c.playlistUrl;

    login.hidden = true;
    klass.hidden = false;
    jumpBtn.hidden = false;
    scrollToClass();
  }

  function findPasswordGroup(passwordGroups, enteredCode) {
    const normalizedEntered = trFold(enteredCode.trim());

    return passwordGroups.find(group => {
      if (group.active !== true) return false;
      if (!Array.isArray(group.codes)) return false;

      return group.codes.some(code => trFold(String(code).trim()) === normalizedEntered);
    });
  }

  async function checkCentralPassword(key) {
    try {
      const response = await fetch(AYDA_PASSWORD_URL + "?v=" + Date.now());
      const passwordGroups = await response.json();

      const group = findPasswordGroup(passwordGroups, key);

      if (!group) {
        err.textContent = "Kod hatalı veya pasif durumda.";
        err.hidden = false;
        return false;
      }

      const now = new Date();
      const expireDate = new Date(group.expires + "T23:59:59");

      if (now > expireDate) {
        err.textContent = "Bu kodun genel kullanım süresi dolmuştur.";
        err.hidden = false;
        return false;
      }

      const storageKey = "ayda_first_login_" + trFold(key);
      const firstLogin = localStorage.getItem(storageKey);

      if (!firstLogin) {
        localStorage.setItem(storageKey, new Date().toISOString());
      } else {
        const firstDate = new Date(firstLogin);
        const diffDays = (now - firstDate) / (1000 * 60 * 60 * 24);

        if (diffDays > Number(group.durationDays)) {
          err.textContent = "Bu kodun ilk girişten sonraki kullanım süresi dolmuştur.";
          err.hidden = false;
          return false;
        }
      }

      return true;

    } catch (error) {
      err.textContent = "Şifre sistemi yüklenemedi. Lütfen tekrar deneyiniz.";
      err.hidden = false;
      return false;
    }
  }

  $('go').onclick = async () => {
    const key = trFold(codeInput.value.trim());

    if(!classes[key]){
      err.textContent = "Bu kodla eşleşen sınıf bulunamadı.";
      err.hidden = false;
      return;
    }

    const allowed = await checkCentralPassword(key);

    if(allowed){
      err.hidden = true;
      renderClass(key);
    }
  };

  $('change').onclick = e => {
    e.preventDefault();
    klass.hidden = true;
    login.hidden = false;
    jumpBtn.hidden = true;
    codeInput.focus();
    window.scrollTo({top:0,behavior:'smooth'});
  };

  jumpBtn.onclick = scrollToClass;
</script>

</body>
</html>
